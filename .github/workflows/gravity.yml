name: Tetris gravity

# Optional: automatically drops the active piece one row on a schedule,
# so the community has to keep up. Delete this file for pure turn-based play.
on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes (GitHub may delay this)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tetris
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gravity tick
        run: node game/play.js "tetris|tick" "gravity-bot"

      - name: Commit result
        run: |
          git config user.name "tetris-bot"
          git config user.email "actions@github.com"
          git add game/state.json assets/board.svg README.md
          git diff --cached --quiet || git commit -m "⬇️ gravity tick"
          git pull --rebase origin main
          git push
