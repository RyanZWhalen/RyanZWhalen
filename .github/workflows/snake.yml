name: Contribution snake

on:
  schedule:
    - cron: "0 0 * * *"   # once a day
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate the snake SVG (dark aurora palette)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # Dark empty cells that recede into the background, ramping up
          # through violet to light purple; pink appears only as the snake.
          outputs: |
            dist/snake.svg?color_snake=%23F0A6FF&color_dots=%23241247,%234C1D95,%236D28D9,%239D4EDD,%23C77DFF

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
