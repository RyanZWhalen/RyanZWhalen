<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" fill="none" role="img" aria-label="Ryan Whalen — Applied Mathematics + Statistics, Harvard University">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#8A8FE6"/>
      <stop offset="0.52" stop-color="#C79BE0"/>
      <stop offset="1" stop-color="#6F5AB6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4B6E4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F4B6E4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7CA0F0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7CA0F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#B57BF0" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#B57BF0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="textglow" x="-20%" y="-60%" width="140%" height="220%"><feGaussianBlur stdDeviation="10"/></filter>
    <clipPath id="round"><rect width="1200" height="360" rx="26"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="360" fill="url(#sky)"/>

    <!-- drifting aurora blobs -->
    <g filter="url(#soft)">
      <ellipse cx="620" cy="150" rx="400" ry="210" fill="url(#glow1)">
        <animate attributeName="cx" values="620;710;560;620" dur="17s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="150;120;185;150" dur="17s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="300" cy="90" rx="320" ry="190" fill="url(#glow2)">
        <animate attributeName="cx" values="300;390;250;300" dur="21s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="90;130;70;90" dur="21s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="980" cy="270" rx="360" ry="200" fill="url(#glow3)">
        <animate attributeName="cx" values="980;900;1040;980" dur="19s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="270;300;235;270" dur="19s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- twinkle -->
    <g fill="#ffffff">
      <circle cx="150" cy="66" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
      <circle cx="1085" cy="104" r="1.7"><animate attributeName="opacity" values="1;0.25;1" dur="5.1s" repeatCount="indefinite"/></circle>
      <circle cx="1015" cy="58" r="2.1"><animate attributeName="opacity" values="0.35;1;0.35" dur="6.3s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="150" r="1.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- wordmark -->
    <g font-family="'Poppins','Trebuchet MS','Segoe UI',system-ui,-apple-system,sans-serif">
      <text x="64" y="112" font-size="30" font-weight="600" fill="#ffffff" opacity="0.9">welcome to</text>
      <text x="60" y="246" font-size="116" font-weight="800" letter-spacing="-3" fill="#ffffff" opacity="0.5" filter="url(#textglow)">ryan whalen</text>
      <text x="60" y="246" font-size="116" font-weight="800" letter-spacing="-3" fill="#ffffff">ryan whalen</text>
      <text x="64" y="308" font-size="26" font-weight="500" fill="#ffffff" opacity="0.92">Applied Mathematics + Statistics · Harvard University</text>
    </g>
  </g>
</svg>
